services:

  # ── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: p2pvideo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       p2pvideo
      POSTGRES_USER:     p2pvideo_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro   # optional init SQL scripts
    ports:
      - "5432:5432"   # remove or comment out in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p2pvideo_user -d p2pvideo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Payara Micro 6 Application Server ────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p2pvideo-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy   # wait until postgres is ready
    environment:
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     p2pvideo
      DB_USER:     p2pvideo_user
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "2026:2026"   # HTTP
      - "6900:6900"   # Payara admin port (optional — remove in production)

# ── Named Volumes ─────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
